AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Minimum web service backend - FastAPI on Lambda

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 512

Resources:
  WebServiceApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - "*"

  WebServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.main.lambda_handler
      CodeUri: .
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebServiceApi
            Path: /{proxy+}
            Method: ANY
        RootEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebServiceApi
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway URL for frontend
    Value: !Sub "https://${WebServiceApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"
